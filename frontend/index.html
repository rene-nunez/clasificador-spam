<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clasificador de Spam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex flex-col">

  <!-- header -->
    <header class="flex items-center justify-between px-4 sm:px-6 py-2 sm:py-4 border-b border-base-200/40">
        <h1 class="text-lg sm:text-xl md:text-2xl font-bold tracking-tight truncate min-w-0">Clasificador de Spam</h1>
        <div class="flex items-center gap-2">

            <!-- control del tema -->
            <label class="swap swap-rotate">
                <input id="theme-checkbox" type="checkbox" />
                    <svg class="swap-off size-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M5.64,17l-.71.71a1,1,0,0,0,0,1.41,1,1,0,0,0,1.41,0l.71-.71A1,1,0,0,0,5.64,17ZM5,12a1,1,0,0,0-1-1H3a1,1,0,0,0,0,2H4A1,1,0,0,0,5,12Zm7-7a1,1,0,0,0,1-1V3a1,1,0,0,0-2,0V4A1,1,0,0,0,12,5ZM5.64,7.05a1,1,0,0,0,.7.29,1,1,0,0,0,.71-.29,1,1,0,0,0,0-1.41l-.71-.71A1,1,0,0,0,4.93,6.34Zm12,.29a1,1,0,0,0,.7-.29l.71-.71a1,1,0,1,0-1.41-1.41L17,5.64a1,1,0,0,0,0,1.41A1,1,0,0,0,17.66,7.34ZM21,11H20a1,1,0,0,0,0,2h1a1,1,0,0,0,0-2Zm-9,8a1,1,0,0,0-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,0,12,19ZM18.36,17A1,1,0,0,0,17,18.36l.71.71a1,1,0,0,0,1.41,0,1,1,0,0,0,0-1.41ZM12,6.5A5.5,5.5,0,1,0,17.5,12,5.51,5.51,0,0,0,12,6.5Zm0,9A3.5,3.5,0,1,1,15.5,12,3.5,3.5,0,0,1,12,15.5Z" />
                    </svg>
                    <svg class="swap-on size-6 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M21.64,13a1,1,0,0,0-1.05-.14,8.05,8.05,0,0,1-3.37.73A8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Zm-9.5,6.69A8.14,8.14,0,0,1,7.08,5.22v.27A10.15,10.15,0,0,0,17.22,15.63a9.79,9.79,0,0,0,2.1-.22A8.11,8.11,0,0,1,12.14,19.73Z" />
                    </svg>
            </label>
      
            <!-- link a GitHub -->
            <a href="https://github.com/rene-nunez/clasificador-spam" target="_blank" rel="noopener" class="btn btn-ghost btn-circle">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-6">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
        </div>
    </header>

    <!-- display -->
    <main id="display" class="flex-1 flex flex-col mx-auto w-full max-w-2xl px-4 sm:px-5"></main>
  
    <!-- area del input, botón y selector del modelo -->
    <footer class="border-t border-base-200/40 px-3 sm:px-6 pb-2 sm:pb-4 pt-1">
        <div class="max-w-2xl mx-auto">
            <div class="border-2 border-base-300 rounded-2xl bg-base-100 shadow-xs transition-colors">
                <form id="form" class="relative">
                    <textarea id="input" rows="1" placeholder="Escribe un mensaje aquí" class="w-full resize-none leading-relaxed text-base px-3 sm:px-4 pt-2 sm:pt-3.5 pb-1.5 sm:pb-2 pr-10 sm:pr-12 min-h-10 sm:min-h-12 max-h-[30vh] sm:max-h-[40vh] overflow-y-auto focus:outline-none"></textarea>
                    <div tooltip="Enviar ↵" tooltip-left class="absolute bottom-1.5 sm:bottom-2 right-1.5 sm:right-2">
                        <button id="btn" type="submit" class="h-7 sm:h-8 w-7 sm:w-8 flex items-center justify-center rounded-lg bg-base-content text-base-100 hover:opacity-80 disabled:opacity-30 transition-opacity">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="size-4">
                                <path fill-rule="evenodd" d="M10 17a.75.75 0 0 1-.75-.75V5.56L6.28 8.53a.75.75 0 0 1-1.06-1.06l4.5-4.5a.75.75 0 0 1 1.06 0l4.5 4.5a.75.75 0 0 1-1.06 1.06l-2.97-2.97v10.69A.75.75 0 0 1 10 17Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </form>
                <div class="flex items-center px-3 sm:px-4 py-1.5 sm:py-2 relative">
                    <div tooltip="Cambiar modelo" tooltip-right>
                        <button id="modelo-btn" class="flex items-center gap-1.5 text-sm font-medium text-base-content/70 hover:text-base-content transition-colors">
                            <span id="modelo-label" class="truncate max-w-30 sm:max-w-50">Regresión Logística</span>
                            <svg class="size-3" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                    <div id="modelo-menu" class="absolute bottom-full left-0 mb-1 hidden min-w-45 rounded-xl border border-base-300/40 bg-base-100 shadow-lg py-1 z-10"></div>
                </div>
            </div>
        </div>
    </footer>
    
    <script type="module" src="./src/main.js"></script>
</body>
</html>
